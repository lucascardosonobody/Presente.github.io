<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Jogo da Surpresa ❤️</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#87d5ff;color:white;font-family:Arial,sans-serif}
body{min-height:100svh;background:linear-gradient(180deg,#8fdcff 0%,#ffd7ef 58%,#fff5e1 100%)}
canvas{display:block;width:100vw;height:100svh;image-rendering:pixelated}
.hud{position:fixed;top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:4;width:min(920px,95vw);display:flex;justify-content:space-between;gap:8px;pointer-events:none;font-weight:800;font-size:clamp(.72rem,3.1vw,1rem);text-shadow:0 2px 8px rgba(80,20,70,.65)}
.pill{background:rgba(255,255,255,.44);color:#7a1d55;border:1px solid rgba(255,255,255,.6);border-radius:999px;padding:8px 11px;box-shadow:0 8px 22px rgba(180,75,135,.18);backdrop-filter:blur(6px)}
.screen{position:fixed;inset:0;z-index:15;display:grid;place-items:center;padding:22px;background:rgba(82,28,72,.35);backdrop-filter:blur(6px);transition:.5s ease}
.screen.hide{opacity:0;pointer-events:none}
.card{width:min(580px,92vw);max-height:min(86svh,720px);overflow:auto;padding:28px 22px;border-radius:28px;text-align:center;background:linear-gradient(145deg,rgba(255,255,255,.84),rgba(255,234,247,.62));border:1px solid rgba(255,255,255,.74);box-shadow:0 18px 48px rgba(180,75,135,.25);color:#7a1d55}
.card h1{font-size:clamp(1.75rem,8.5vw,3.25rem);margin-bottom:12px;color:#d73588;text-shadow:0 0 12px rgba(255,255,255,.8)}
.card p{line-height:1.55;color:rgba(78,25,62,.86);margin-bottom:16px;font-size:clamp(.92rem,3.8vw,1.03rem)}
button{border:0;border-radius:999px;padding:13px 22px;background:linear-gradient(90deg,#ff5fa2,#ff8bc0);color:white;font-weight:900;font-size:1rem;box-shadow:0 10px 28px rgba(255,95,162,.32)}
.controls{position:fixed;left:0;right:0;bottom:max(14px,env(safe-area-inset-bottom));z-index:6;display:flex;justify-content:space-between;padding:0 18px;pointer-events:none}
.group{display:flex;gap:12px;pointer-events:auto}
.ctrl{width:58px;height:58px;display:grid;place-items:center;padding:0;background:rgba(255,95,162,.52);border:1px solid rgba(255,255,255,.58);font-size:1.45rem;backdrop-filter:blur(5px);touch-action:none}
.jump{width:74px;height:74px;font-size:1.9rem;background:rgba(255,95,162,.66)}
.music-btn,.next-music-btn{
  position:fixed;
  right:14px;
  z-index:7;
  width:auto;
  min-width:92px;
  padding:9px 13px;
  border-radius:999px;
  background:rgba(255,95,162,.58);
  border:1px solid rgba(255,255,255,.62);
  color:white;
  font-size:.82rem;
  font-weight:900;
  box-shadow:0 8px 22px rgba(180,75,135,.18);
  backdrop-filter:blur(6px);

.music-btn{top:max(58px,calc(env(safe-area-inset-top) + 58px))}
.next-music-btn{top:max(100px,calc(env(safe-area-inset-top) + 100px));background:rgba(255,139,192,.50)}
.music-btn.off{background:rgba(120,80,120,.42)}

@media (orientation:landscape) and (max-height:560px){
  .hud{
    top:max(6px,env(safe-area-inset-top));
    width:min(620px,calc(100vw - 150px));
    font-size:clamp(.62rem,1.6vw,.82rem);
    gap:6px;

  .pill{padding:6px 9px}
  .screen{padding:8px 78px}
  .card{
    width:min(520px,76vw);
    max-height:88svh;
    padding:16px 18px;
    border-radius:22px;

  .card h1{
    font-size:clamp(1.35rem,4.2vw,2.15rem);

  .card p{
    font-size:clamp(.76rem,2vw,.9rem);
    line-height:1.34;
    margin-bottom:9px;
  }
  button{padding:10px 17px;font-size:.88rem}
  .controls{
    bottom:max(8px,env(safe-area-inset-bottom));
    padding:0 10px;
  }
  .group{gap:8px}
  .ctrl{
    width:48px;
    height:48px;
    font-size:1.08rem;
    background:rgba(255,95,162,.48);
  }
  .jump{
    width:58px;
    height:58px;
    font-size:1.45rem;
  }
  .music-btn,.next-music-btn{
    right:max(8px,env(safe-area-inset-right));

    padding:7px 8px;
    font-size:.68rem;
  }
  .music-btn{top:max(8px,env(safe-area-inset-top))}
  .next-music-btn{top:max(42px,calc(env(safe-area-inset-top) + 42px))}

@media (orientation:landscape) and (max-height:420px){
  .hud{
    left:10px;
    transform:none;
    width:auto;
    max-width:calc(100vw - 110px);

  }

  .screen{padding:6px 70px}

  .ctrl{width:42px;height:42px;font-size:.96rem}
  .jump{width:52px;height:52px;font-size:1.25rem}

@media (orientation:portrait) and (max-width:420px){
  .hud{font-size:clamp(.68rem,3vw,.86rem)}
  .card{padding:22px 18px}
  .ctrl{width:56px;height:56px}
  .jump{width:70px;height:70px}
}

</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="pill">❤️ <span id="score">0</span>/<span id="total">7</span></div>
  <div class="pill">Mundo alternativo ✨</div>
</div>

<section class="screen" id="start">
  <div class="card">
    <h1>Mundo Alternativo ❤️</h1>
    <p>
      Você está em mundo alternativo, pegue os corações pelo mapa e passe pelo portal.
    </p>
    <p style="opacity:.74;font-size:.9rem">
      No celular use os botões. No computador use A/D ou setas e espaço para pular.
    </p>
    <button id="startBtn">Começar jogo</button>
  </div>
</section>

<section class="screen hide" id="end">
  <div class="card">
    <h1>Você chegou! ❤️</h1>
    <p>A surpresa vai abrir agora...</p>
    <button id="openBtn">Abrir surpresa</button>
  </div>
</section>

<div class="controls">
  <div class="group">
    <button class="ctrl" id="left">◀</button>
    <button class="ctrl" id="right">▶</button>
  </div>
  <div class="group">
    <button class="ctrl jump" id="jump">↑</button>
  </div>
</div>

<button class="music-btn off" id="musicBtn">♪ música</button>
<button class="next-music-btn" id="nextMusicBtn">↻ trocar</button>

function activeSong(){

function noteToFreq(note){
  const notes = {C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};
  const m = note.match(/^([A-G]#?)(\d)$/);
  if(!m) return 440;
  const semitone = notes[m[1]];
  const octave = Number(m[2]);
  const midi = (octave + 1) * 12 + semitone;
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function playTone(freq, duration, type='square', gainValue=0.045){
  if(!audioCtx || !musicOn) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + duration + 0.025);
}

function playCuteMusicStep(){
  if(!audioCtx || !musicOn) return;

  const song = activeSong();
  const melody = song.melody[musicStep % song.melody.length];
  const bass = song.bass[Math.floor(musicStep/4) % song.bass.length];

  playTone(noteToFreq(melody[0]), melody[1], song.type, song.gain);

  if(musicStep % 4 === 0){
    playTone(noteToFreq(bass[0]), 0.22, 'triangle', 0.022);
  }

  if(musicStep % 8 === 3 || musicStep % 8 === 7){
    playTone(noteToFreq('C7'), 0.045, 'sine', 0.012);
  }

  musicStep++;

  // Quando uma música completa, passa para a próxima automaticamente.
  if(musicStep > 0 && musicStep % song.melody.length === 0){
    currentSongIndex = (currentSongIndex + 1) % cutePlaylist.length;
    musicStep = 0;
    updateMusicLabel();
  }
}

function updateMusicLabel(){
  const song = activeSong();
  nextMusicBtn.textContent = '↻ ' + (currentSongIndex + 1) + '/' + cutePlaylist.length;
  if(musicOn){
    musicBtn.classList.remove('off');
    musicBtn.textContent = '♪ ' + song.name;
  } else {
    musicBtn.classList.add('off');
    musicBtn.textContent = '♪ música';
  }
}

function startMusic(){
  if(musicOn) return;
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();

  musicOn = true;
  updateMusicLabel();

  playCuteMusicStep();
  const song = activeSong();
  musicTimer = setInterval(playCuteMusicStep, song.tempo);
}

function restartMusicTimer(){
  if(musicTimer){
    clearInterval(musicTimer);
    musicTimer = null;
  }
  if(musicOn){
    const song = activeSong();
    musicTimer = setInterval(playCuteMusicStep, song.tempo);
  }
}

function stopMusic(){
  musicOn = false;
  updateMusicLabel();
  if(musicTimer){
    clearInterval(musicTimer);
    musicTimer = null;
  }
}

function toggleMusic(){
  if(musicOn) stopMusic();
  else startMusic();
}

function nextMusic(){
  currentSongIndex = (currentSongIndex + 1) % cutePlaylist.length;
  musicStep = 0;
  updateMusicLabel();
  restartMusicTimer();
  if(musicOn) playCuteMusicStep();
}

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;
  H=window.innerHeight;
  canvas.width=Math.floor(W*DPR);
  canvas.height=Math.floor(H*DPR);
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.imageSmoothingEnabled=false;

  const landscape = W > H;
  if(landscape && H < 560){
    // Correção principal para celular deitado:
    // antes a escala nunca ficava menor que 0.82, então o mapa ficava grande e cortado.
    scale = Math.min(W/900, H/520);
    scale = Math.max(0.46, Math.min(scale,0.86));
  } else {
    scale=Math.min(W/430,H/760);
    scale=Math.max(0.74, Math.min(scale,1.12));
  }
}
window.addEventListener('resize', resize);

function rects(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function worldToScreen(x,y){
  const landscape = W > H && H < 560;
  const verticalFactor = landscape ? 0.72 : 0.58;
  return { x:(x-cam.x)*scale, y:y*scale + (H-world.h*scale)*verticalFactor };
}

function activeInvisibleBlocks(){

function allSolids(){
  return [
    ...groundSegments.map(g=>({...g, type:'ground'})),
    ...islands.map(i=>({...i, type:'island'})),
    ...rearIslands.map(i=>({...i, type:'rearIsland'})),
    ...activeInvisibleBlocks(),
    ...crates.map(c=>({...c, type:'crate'}))
  ];
}


function heartSurfaceCandidates(){
  // Corações sempre nascem em cima de superfícies sólidas.
  // Inclui chão, plataformas principais e plataformas do fundo.
  // Agora NÃO separa por área e NÃO favorece a frente.
  // Pode nascer no começo, meio ou final do mapa, desde que não esteja perto dela.
  return [
    ...groundSegments.map(s => ({...s, kind:'ground'})),
    ...islands.map(s => ({...s, kind:'island'})),
    ...rearIslands.map(s => ({...s, kind:'rearIsland'}))
  ].filter(s =>
    s.w >= 68 &&
    s.x < portal.x + 80
  );
}

function randomBetween(min, max){
  return min + Math.random() * (max - min);
}

function makeHeartOnSurface(surface, order){
  const margin = Math.min(20, Math.max(10, surface.w * 0.16));
  const minX = surface.x + margin;
  const maxX = surface.x + surface.w - margin;
  const x = randomBetween(minX, Math.max(minX, maxX));
  const y = surface.y - 34;
  return {
    x,
    y,
    g:false,
    order,
    surfaceKind: surface.kind
  };
}

function zoneForHeart(order){
  // Divide o mapa em 7 faixas.
  // O coração continua "aleatório", mas nasce em uma região diferente do mapa.
  const startX = 520;
  const endX = portal.x - 520;
  const zoneW = (endX - startX) / HEART_TOTAL;
  return {
    start: startX + zoneW * order,
    end: startX + zoneW * (order + 1)
  };
}

function isFarFromPlayer(heart){
  const px = player.x + player.w / 2;
  return Math.abs(heart.x - px) >= MIN_HEART_DISTANCE_FROM_PLAYER;
}

function chooseInvisibleHeartPosition(){
  const target = invisibleHeartBlocks.find(b => b.target) || invisibleHeartBlocks[invisibleHeartBlocks.length - 1];
  return {
    x: target.x + target.w / 2,
    y: target.y - 34,
    g:false,
    order: 3,
    surfaceKind: 'invisibleBlock',
    invisibleChallenge:true
  };
}

function chooseHardHeartPosition(){
  const all = heartSurfaceCandidates();
  const hardSurfaces = all.filter(surface => surface.hard);
  if(hardSurfaces.length === 0) return null;

  const px = player.x + player.w / 2;
  const farHard = hardSurfaces.filter(surface => {
    const center = surface.x + surface.w/2;
    return Math.abs(center - px) >= MIN_HEART_DISTANCE_FROM_PLAYER;
  });

  const pool = farHard.length ? farHard : hardSurfaces;

  // Escolhe uma das plataformas difíceis acessíveis e coloca o coração no centro,
  // para garantir que pelo menos um coração realmente nasça nela.
  const surface = pool[Math.floor(Math.random() * pool.length)];
  return {
    x: surface.x + surface.w / 2,
    y: surface.y - 34,
    g:false,
    order: currentHeartIndex + 1,
    surfaceKind: surface.kind,
    hard:true
  };
}

function chooseNextHeartPosition(){
  const all = heartSurfaceCandidates();
  const px = player.x + player.w / 2;

  // Coração 3: desafio dos blocos invisíveis.
  // Ele fica alto e só dá para alcançar usando esses blocos.
  if(currentHeartIndex === 2){
    return chooseInvisibleHeartPosition();
  }

  // Garante que pelo menos 1 coração nasça em uma plataforma extremamente difícil.
  // Escolhi o 4º coração para isso, porque ela já vai estar explorando o mapa.
  if(currentHeartIndex === 3 && !forcedHardHeartDone){
    const hardHeart = chooseHardHeartPosition();
    if(hardHeart){
      forcedHardHeartDone = true;
      return hardHeart;
    }
  }

  // Aqui está a correção principal:
  // antes o código favorecia plataformas à frente.
  // agora ele sorteia qualquer plataforma do mapa inteiro,
  // seja no começo, no meio, no final, atrás ou na frente.
  for(let attempt=0; attempt<220; attempt++){
    const surface = all[Math.floor(Math.random() * all.length)];
    const heart = makeHeartOnSurface(surface, currentHeartIndex + 1);

    // A única regra é: não pode nascer perto dela.
    if(isFarFromPlayer(heart)) return heart;
  }

  // Segunda tentativa: cria uma lista de plataformas realmente longe dela.
  const farSurfaces = all.filter(surface => {
    const leftDistance = Math.abs(surface.x - px);
    const rightDistance = Math.abs(surface.x + surface.w - px);
    const centerDistance = Math.abs(surface.x + surface.w/2 - px);
    return Math.max(leftDistance, rightDistance, centerDistance) >= MIN_HEART_DISTANCE_FROM_PLAYER;
  });

  if(farSurfaces.length > 0){
    for(let attempt=0; attempt<160; attempt++){
      const surface = farSurfaces[Math.floor(Math.random() * farSurfaces.length)];
      const heart = makeHeartOnSurface(surface, currentHeartIndex + 1);
      if(isFarFromPlayer(heart)) return heart;
    }
  }

  // Plano de segurança: se por algum motivo não conseguir sortear,
  // escolhe o ponto mais distante possível da personagem.
  let best = null;
  let bestDistance = -1;

  for(const surface of all){
    const points = [
      surface.x + 24,
      surface.x + surface.w / 2,
      surface.x + surface.w - 24
    ];

    for(const x of points){
      const heart = {
        x,
        y: surface.y - 34,
        g:false,
        order: currentHeartIndex + 1,
        surfaceKind: surface.kind
      };

      const d = Math.abs(heart.x - px);
      if(d > bestDistance){
        bestDistance = d;
        best = heart;
      }
    }
  }

  return best;
}

function spawnNextHeart(){
  if(currentHeartIndex >= HEART_TOTAL){
    activeHeart = null;
    return;
  }

  activeHeart = chooseNextHeartPosition();

  if(activeHeart && activeHeart.order === 3){
    speechBubbleText = 'o coração está longe das plataformas... deve ter um caminho invisível!';
    speechBubbleTimer = 300;
  }
}

function moveCrates(){
  for(const c of crates){
    c.vx *= 0.90;
    if(Math.abs(c.vx)<0.05) c.vx=0;
    c.x += c.vx;
    if(c.x<20) c.x=20;
    if(c.x+c.w>world.w-20) c.x=world.w-20-c.w;

    for(const s of [...groundSegments, ...islands, ...rearIslands]){
      if(rects(c,s)){
        if(c.vx>0) c.x=s.x-c.w;
        if(c.vx<0) c.x=s.x+s.w;
        c.vx=0;
      }
    }
    for(const other of crates){
      if(other===c) continue;
      if(rects(c,other)){
        if(c.vx>0) c.x=other.x-c.w;
        if(c.vx<0) c.x=other.x+other.w;
        c.vx=0;
      }
    }
  }
}

function collidePlayerX(){
  for(const s of allSolids()){
    if(rects(player,s)){
      if(s.type==='crate'){
        let push = player.face;
        if(player.vx>0.05) push=1;
        if(player.vx<-0.05) push=-1;
        s.vx += push*3.2;
        if(push>0) player.x=s.x-player.w;
        if(push<0) player.x=s.x+s.w;
        player.vx *= 0.65;
      } else {
        if(player.vx>0) player.x=s.x-player.w;
        if(player.vx<0) player.x=s.x+s.w;
        player.vx=0;
      }
    }
  }
}

function collidePlayerY(){
  player.ground=false;
  for(const s of allSolids()){
    if(rects(player,s)){
      if(player.vy>0){
        player.y=s.y-player.h;
        player.vy=0;
        player.ground=true;
      } else if(player.vy<0){
        player.y=s.y+s.h;
        player.vy=0;
      }
    }
  }
}

function hitSpike(){
  const hurt={x:player.x+8,y:player.y+12,w:player.w-16,h:player.h-14};
  for(const sp of spikes) if(rects(hurt,sp)) return true;
  return false;
}

function positionHitsSpike(x, y){
  const hurt = {x:x+8, y:y+12, w:player.w-16, h:player.h-14};
  return spikes.some(sp => rects(hurt, sp));
}

function groundForRespawn(x){
  const center = x + player.w/2;
  let ground = groundSegments.find(g => center >= g.x && center <= g.x + g.w);

  if(!ground){
    ground = groundSegments
      .slice()
      .sort((a,b) => Math.abs((a.x+a.w/2)-center) - Math.abs((b.x+b.w/2)-center))[0];
  }

  return ground;
}

function respawn(){
  const ground = groundForRespawn(player.checkpointX);
  let safeX = Math.max(ground.x + 10, Math.min(player.checkpointX, ground.x + ground.w - player.w - 10));
  const safeY = ground.y - player.h - 2;

  // Evita renascer em cima de espinho. Primeiro tenta ir para a direita, depois para a esquerda.
  let found = false;
  for(let i=0;i<34;i++){
    const rightX = Math.min(ground.x + ground.w - player.w - 10, safeX + i*12);
    if(!positionHitsSpike(rightX, safeY)){
      safeX = rightX;
      found = true;
      break;
    }

    const leftX = Math.max(ground.x + 10, safeX - i*12);
    if(!positionHitsSpike(leftX, safeY)){
      safeX = leftX;
      found = true;
      break;
    }
  }

  player.x = safeX;
  player.y = safeY;
  player.vx = 0;
  player.vy = 0;
  player.ground = false;

  // Se por algum motivo ainda encostar em bloco, a colisão vertical corrige no próximo frame.
  collidePlayerY();
}

function update(){
  if(!started||finished) return;

  moveCrates();

  if(keys.left){ player.vx -= speed; player.face=-1; }
  if(keys.right){ player.vx += speed; player.face=1; }

  player.vx *= friction;
  player.vx = Math.max(-maxSpeed, Math.min(maxSpeed, player.vx));

  if(keys.jump && player.ground){
    player.vy = -jumpPower;
    player.ground=false;
  }

  player.vy += gravity;
  player.x += player.vx;
  collidePlayerX();

  player.y += player.vy;
  collidePlayerY();

  if(player.x<0) player.x=0;
  if(player.x+player.w>world.w) player.x=world.w-player.w;

  if(hitSpike() || player.y > world.h+120) respawn();

  if(activeHeart && rects(player, {x:activeHeart.x-20,y:activeHeart.y-20,w:40,h:40})){
    activeHeart.g = true;
    collectedHearts.push(activeHeart);
    currentHeartIndex++;
    scoreEl.textContent = currentHeartIndex;

    if(currentHeartIndex === 1){
      speechBubbleText = 'onde estão os outros corações? vou ter que procurar!';
      speechBubbleTimer = 260;
    }

    spawnNextHeart();
  }

  for(const cp of checkpoints){
    if(player.x>cp && player.checkpointX<cp) player.checkpointX=cp;
  }

  if(rects(player, portal)){
    const collected = collectedHeartCount();
    if(collected === HEART_TOTAL){
      finish();
    }else{
      portalMessageTimer = 120;
      player.x = portal.x - player.w - 12;
      player.vx = -2;
    }
  }

  if(portalMessageTimer > 0) portalMessageTimer--;
  if(speechBubbleTimer > 0) speechBubbleTimer--;

  const landscape = W > H && H < 560;
  const cameraLead = landscape ? player.face * 90 : 0;
  const target = player.x + cameraLead - W/(2*scale);
  cam.x += (target-cam.x)*0.08;
  cam.x = Math.max(0, Math.min(cam.x, world.w - W/scale));

  frameTick++;
}

function finish(){
  finished=true;
  endScreen.classList.remove('hide');
  setTimeout(()=>{ window.location.href = ARQUIVO_DA_SURPRESA; }, 1700);
}


function drawTintedImage(img, x, y, w, h, tint='rgba(255,180,214,0.22)', glow='rgba(255,210,235,0.16)'){
  ctx.save();
  ctx.drawImage(img, x, y, w, h);
  ctx.globalCompositeOperation = 'source-atop';
  ctx.fillStyle = tint;
  ctx.fillRect(x, y, w, h);
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = glow;
  ctx.fillRect(x, y, w, h);
  ctx.restore();
}

function drawTinyFlower(x, y, size=1){
  const petal = 2.9*size*scale;
  ctx.fillStyle = '#ff9ecf';
  for(let a=0;a<6;a++){
    const ang = (Math.PI*2/6)*a;
    ctx.beginPath();
    ctx.ellipse(x + Math.cos(ang)*4.4*size*scale, y + Math.sin(ang)*4.4*size*scale, petal, petal*0.8, ang, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle = '#fff1a8';
  ctx.beginPath();
  ctx.arc(x, y, 2.2*size*scale, 0, Math.PI*2);
  ctx.fill();
}

function drawCandySparkles(){
  const t = Date.now()*0.001;
  for(let i=0;i<26;i++){
    const x = ((i*187 - cam.x*0.12)%(W+140)+W+140)%(W+140)-70;
    const y = 110 + (i%6)*42 + Math.sin(t*1.8 + i)*10;
    const r = (i%3===0 ? 3.2 : 2.2)*scale;
    ctx.save();
    ctx.globalAlpha = 0.72;
    ctx.fillStyle = i%2===0 ? '#ffd6ee' : '#fff2b4';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}


function drawSky(){
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#ffc7ea');
  sky.addColorStop(0.34,'#ffd9f3');
  sky.addColorStop(0.68,'#ffe7f6');
  sky.addColorStop(1,'#fff4fb');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,H);

  // sol/docinho
  const sunGrad = ctx.createRadialGradient(W-72,74,8,W-72,74,42);
  sunGrad.addColorStop(0,'rgba(255,247,190,.98)');
  sunGrad.addColorStop(1,'rgba(255,199,228,.35)');
  ctx.fillStyle=sunGrad;
  ctx.beginPath();
  ctx.arc(W-72,74,36,0,Math.PI*2);
  ctx.fill();

  for(const c of decoClouds){
    const x=((c.x-cam.x*0.06)%(W+220)+W+220)%(W+220)-110;
    drawTintedImage(imgs.cloud, x, c.y, imgs.cloud.width*c.s, imgs.cloud.height*c.s, 'rgba(255,194,228,0.18)', 'rgba(255,255,255,0.16)');
  }

  drawCandySparkles();
  drawHill('#f8b5d8', 0.08, 640, 42);
  drawHill('#eba6cb', 0.16, 700, 70);
  drawHill('rgba(232,154,196,0.55)', 0.24, 742, 46);
}

function drawHill(color,parallax,baseY,amp){
  ctx.save();
  ctx.fillStyle=color;
  ctx.beginPath();
  const off=-cam.x*parallax;
  ctx.moveTo(-80,H);
  for(let x=-80; x<=W+120; x+=90){
    const wx=x-off;
    const y=worldToScreen(0, baseY + Math.sin(wx*0.01)*amp).y;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W+120,H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawDeco(){
  for(const t of decoTrees){
    const sx = (t.x - cam.x*t.layer)*scale;
    const groundS = worldToScreen(0, groundY).y;
    const w = imgs.tree.width*t.size*scale, h = imgs.tree.height*t.size*scale;
    if(sx<-w || sx>W+w) continue;
    drawTintedImage(imgs.tree, sx, groundS-h+8*scale, w, h, 'rgba(255,160,205,0.24)', 'rgba(255,210,240,0.14)');

    // flores no chão perto das árvores
    for(let k=0;k<2;k++){
      const fx = sx + (18 + k*18 + (t.x%13))*scale;
      const fy = groundS - 6*scale - k*1.5*scale;
      drawTinyFlower(fx, fy, 0.78 + k*0.08);
    }
  }

  for(const b of decoBushes){
    const sx=(b.x-cam.x*b.layer)*scale;
    const gy=worldToScreen(0,b.y).y;
    const mul = (0.92 + (b.layer*0.18));
    const w=imgs.bush.width*mul*scale, h=imgs.bush.height*mul*scale;
    if(sx<-w || sx>W+w) continue;
    drawTintedImage(imgs.bush, sx, gy-h, w, h, 'rgba(255,145,196,0.24)', 'rgba(255,222,242,0.12)');

    // mini flores
    drawTinyFlower(sx + w*0.34, gy - h*0.38, 0.54);
    if((b.x/10)%2 > 0.7) drawTinyFlower(sx + w*0.66, gy - h*0.32, 0.48);
  }
}

function drawPhotoSpots(){
  const t = Date.now()*0.0013;
  for(let i=0;i<photoSpots.length;i++){
    const p = photoSpots[i];
    const floatY = Math.sin(t*p.drift + i*0.9) * 10;
    const sway = Math.sin(t*0.7 + i*0.65) * 0.08;
    const anchorX = (p.x - cam.x*p.layer)*scale;
    const anchorY = worldToScreen(0, p.y).y + floatY*scale;
    const w = p.w * scale;
    const h = p.h * scale;
    if(anchorX < -w-60 || anchorX > W+60) continue;

    ctx.save();
    ctx.translate(anchorX + w/2, anchorY + (h+18*scale)/2);
    ctx.rotate(sway);

    const sx = -w/2;
    const sy = -(h+18*scale)/2;

    ctx.fillStyle = 'rgba(0,0,0,.10)';
    ctx.fillRect(sx + 6*scale, sy + 8*scale, w, h + 18*scale);

    ctx.strokeStyle = 'rgba(255,189,214,.82)';
    ctx.lineWidth = 2.5*scale;
    ctx.beginPath();
    ctx.moveTo(0, sy + h + 18*scale);
    ctx.quadraticCurveTo(10*scale, sy + h + 28*scale, 18*scale, sy + h + 38*scale);
    ctx.stroke();

    ctx.fillStyle = '#fffdfd';
    ctx.fillRect(sx, sy, w, h + 18*scale);
    ctx.strokeStyle = 'rgba(255,255,255,.88)';
    ctx.lineWidth = 2*scale;
    ctx.strokeRect(sx, sy, w, h + 18*scale);

    const img = photoImgs[p.photo % photoImgs.length];
    const pad = 7*scale;
    const innerX = sx + pad;
    const innerY = sy + pad;
    const innerW = w - pad*2;
    const innerH = h - pad*1.25;
    if(img && img.complete && img.naturalWidth > 0){
      const ratio = Math.max(innerW / img.naturalWidth, innerH / img.naturalHeight);
      const dw = img.naturalWidth * ratio;
      const dh = img.naturalHeight * ratio;
      const dx = innerX + (innerW - dw)/2;
      const dy = innerY + (innerH - dh)/2;
      ctx.save();
      ctx.beginPath();
      ctx.rect(innerX, innerY, innerW, innerH);
      ctx.clip();
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.restore();
    } else {
      ctx.fillStyle = '#ffd6ee';
      ctx.fillRect(innerX, innerY, innerW, innerH);
      ctx.fillStyle = '#8c1d62';
      ctx.font = `${10*scale}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('foto', innerX + innerW/2, innerY + innerH/2 + 3*scale);
    }

    if(p.w >= 60){
      ctx.fillStyle = '#ff5f97';
      ctx.font = `${11*scale}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('♥', 0, sy + h + 12*scale);
    } else {
      ctx.fillStyle = 'rgba(255,95,162,.85)';
      ctx.beginPath();
      ctx.arc(0, sy + h + 9*scale, 2.6*scale, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawPlatformDecorations(){
  const t = Date.now()*0.003;
  for(let i=0;i<platformDecos.length;i++){
    const d = platformDecos[i];
    const s = worldToScreen(d.x, d.y);
    if(s.x < -40 || s.x > W+40) continue;
    ctx.save();
    if(d.kind === 'bush'){
      const w = imgs.bush.width * d.size * scale;
      const h = imgs.bush.height * d.size * scale;
      drawTintedImage(imgs.bush, s.x - w/2, s.y - h + 4*scale, w, h, 'rgba(255,150,196,0.24)', 'rgba(255,230,246,0.08)');
    } else if(d.kind === 'heart'){
      const bob = Math.sin(t + i)*2.5*scale;
      ctx.fillStyle = '#ff6faa';
      ctx.font = `bold ${15*d.size*scale}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('♥', s.x, s.y - 6*scale + bob);
    } else if(d.kind === 'flower'){
      const bob = Math.sin(t*0.8 + i)*1.6*scale;
      const cx = s.x;
      const cy = s.y - 7*scale + bob;
      const petal = 3.8*d.size*scale;
      ctx.fillStyle = '#ff9ecc';
      for(let a=0;a<6;a++){
        const ang = (Math.PI*2/6)*a;
        ctx.beginPath();
        ctx.ellipse(cx + Math.cos(ang)*5*scale, cy + Math.sin(ang)*5*scale, petal, petal*0.85, ang, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = '#fff0a8';
      ctx.beginPath();
      ctx.arc(cx, cy, 2.9*scale, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#d07aaa';
      ctx.lineWidth = 1.3*scale;
      ctx.beginPath();
      ctx.moveTo(cx, cy + 4*scale);
      ctx.lineTo(cx, cy + 11*scale);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawTiledBlock(rect, opts={}){
  const alpha = opts.alpha ?? 1;
  const offsetX = opts.offsetX ?? 0;
  const offsetY = opts.offsetY ?? 0;
  const shrink = opts.shrink ?? 1;
  const topH = 32;
  const width = Math.max(32, rect.w * shrink);
  const height = Math.max(40, rect.h * shrink);
  const baseX = rect.x + offsetX;
  const baseY = rect.y + offsetY;

  ctx.save();
  ctx.globalAlpha = alpha;

  for(let x=0; x<width; x+=32){
    const top = worldToScreen(baseX + x, baseY);
    drawTintedImage(imgs.grass, Math.floor(top.x), Math.floor(top.y), 32*scale, 32*scale, 'rgba(255,177,216,0.28)', 'rgba(255,230,246,0.08)');

    for(let y=topH; y<height; y+=32){
      const s = worldToScreen(baseX + x, baseY + y);
      drawTintedImage(imgs.dirt, Math.floor(s.x), Math.floor(s.y), 32*scale, 32*scale, 'rgba(255,190,220,0.22)', 'rgba(255,245,250,0.05)');
    }
  }

  // brilho de topo
  const topS = worldToScreen(baseX, baseY);
  ctx.fillStyle = 'rgba(255,241,248,0.22)';
  ctx.fillRect(topS.x, topS.y, width*scale, 6*scale);

  ctx.restore();
}

function drawFloatingPlatform(rect, opts={}){
  const alpha = opts.alpha ?? 1;
  const offsetX = opts.offsetX ?? 0;
  const offsetY = opts.offsetY ?? 0;
  const shrink = opts.shrink ?? 1;
  const base = {
    x: rect.x + offsetX,
    y: rect.y + offsetY,
    w: rect.w * shrink,
    h: rect.h * shrink
  };

  ctx.save();
  ctx.globalAlpha = alpha;

  for(let x=0; x<base.w; x+=32){
    const top = worldToScreen(base.x + x, base.y);
    drawTintedImage(imgs.grass, Math.floor(top.x), Math.floor(top.y), 32*scale, 32*scale, 'rgba(255,177,216,0.30)', 'rgba(255,230,246,0.08)');

    const dirt = worldToScreen(base.x + x, base.y + 24);
    drawTintedImage(imgs.dirt, Math.floor(dirt.x), Math.floor(dirt.y), 32*scale, 24*scale, 'rgba(255,191,221,0.24)', 'rgba(255,244,249,0.05)');
  }

  const s = worldToScreen(base.x, base.y + base.h + 4);
  ctx.fillStyle = 'rgba(124,88,120,.12)';
  ctx.beginPath();
  ctx.ellipse(
    s.x + (base.w*scale)/2,
    s.y,
    base.w*0.32*scale,
    5*scale,
    0,
    0,
    Math.PI*2
  );
  ctx.fill();

  // toquinhos de grama/fofura em cima
  const left = worldToScreen(base.x + 16, base.y).x;
  const right = worldToScreen(base.x + base.w - 16, base.y).x;
  const y = worldToScreen(base.x, base.y).y + 8*scale;
  for(let tx=left; tx<right; tx+=38*scale){
    drawTinyFlower(tx, y - 3*scale, 0.24);
  }

  ctx.restore();
}

function drawGroundSegments(){
  for(const g of groundSegments) drawTiledBlock(g);
}

function drawIslands(){
  for(const p of islands){
    drawFloatingPlatform(p);
  }
}

function drawRopes(){
  for(const r of ropes){
    const a = worldToScreen(r.x1, r.y1);
    const b = worldToScreen(r.x2, r.y2);
    const midx = (a.x+b.x)/2;
    const midy = Math.max(a.y, b.y) + 18*scale;

    ctx.save();
    ctx.strokeStyle = 'rgba(214,139,179,.92)';
    ctx.lineWidth = 3*scale;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(midx, midy, b.x, b.y);
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,215,233,.96)';
    ctx.beginPath(); ctx.arc(a.x, a.y, 3*scale, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(b.x, b.y, 3*scale, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawInvisibleHeartBlocks(){
  if(!invisibleHeartChallengeActive()) return;

  const t = Date.now()*0.004;
  for(let i=0;i<invisibleHeartBlocks.length;i++){
    const b = invisibleHeartBlocks[i];
    const s = worldToScreen(b.x, b.y);
    if(s.x < -80 || s.x > W+80) continue;

    ctx.save();

    // Quase invisível: dá para sentir que tem algo ali, mas não parece uma plataforma normal.
    const alpha = 0.075 + 0.04*Math.sin(t + i*0.8);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(s.x, s.y, b.w*scale, b.h*scale);

    ctx.globalAlpha = 0.18 + 0.08*Math.sin(t*1.4 + i);
    ctx.strokeStyle = 'rgba(255,255,255,.9)';
    ctx.lineWidth = 1.3*scale;
    ctx.strokeRect(s.x, s.y, b.w*scale, b.h*scale);

    // pequenas estrelinhas para dar uma dica sem revelar demais
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#ffd6ee';
    ctx.font = `${9*scale}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('✦', s.x + b.w*scale/2, s.y - 5*scale + Math.sin(t+i)*2*scale);

    ctx.restore();
  }
}

function drawHearts(){
  if(!activeHeart) return;

  const t = Date.now()*0.004;
  const h = activeHeart;

  const bob = Math.sin(t + currentHeartIndex) * 6;
  const pulse = 1 + 0.12*Math.sin(t*1.5 + currentHeartIndex*0.8);
  const s = worldToScreen(h.x, h.y + bob);
  const size = 38 * pulse * scale;

  ctx.save();

  const grad = ctx.createRadialGradient(s.x, s.y, 2*scale, s.x, s.y, 26*scale*pulse);
  grad.addColorStop(0, 'rgba(255,120,170,0.45)');
  grad.addColorStop(0.55, 'rgba(255,120,170,0.18)');
  grad.addColorStop(1, 'rgba(255,120,170,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(s.x, s.y, 26*scale*pulse, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,255,255,0.42)';
  ctx.lineWidth = 2.2*scale;
  ctx.beginPath();
  ctx.arc(s.x, s.y, 19*scale*pulse, 0, Math.PI*2);
  ctx.stroke();

  ctx.shadowColor = 'rgba(255,80,150,0.55)';
  ctx.shadowBlur = 12*scale;
  ctx.drawImage(imgs.heart, Math.floor(s.x-size/2), Math.floor(s.y-size/2), size, size);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.arc(s.x - 10*scale, s.y - 10*scale, 2.1*scale, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s.x + 11*scale, s.y - 8*scale, 1.6*scale, 0, Math.PI*2);
  ctx.fill();

  // Mostra qual coração é: 1, depois 2, depois 3...
  ctx.lineWidth = 3.5*scale;
  ctx.strokeStyle = 'rgba(140,29,98,0.95)';
  ctx.fillStyle = 'rgba(255,255,255,0.98)';
  ctx.font = `bold ${13*scale}px Arial`;
  ctx.textAlign = 'center';
  ctx.strokeText(h.order, s.x, s.y+4.5*scale);
  ctx.fillText(h.order, s.x, s.y+4.5*scale);

  ctx.restore();
}

function drawSigns(){

    ctx.strokeText(sign.text, s.x+8*scale, s.y-38*scale);
    ctx.fillText(sign.text, s.x+8*scale, s.y-38*scale);
  }
  ctx.restore();
}

function drawPortal(){
  const s=worldToScreen(portal.x, portal.y);
  const collected = collectedHeartCount();
  drawTintedImage(imgs.portal, Math.floor(s.x), Math.floor(s.y), portal.w*scale, portal.h*scale, 'rgba(255,179,220,0.18)', 'rgba(255,238,247,0.08)');
  drawTinyFlower(s.x + 10*scale, s.y + 12*scale, 0.55);
  drawTinyFlower(s.x + portal.w*scale - 12*scale, s.y + 16*scale, 0.55);

  ctx.fillStyle='#8c1d62';
  ctx.font=`${15*scale}px Arial`;
  ctx.textAlign='center';
  ctx.fillText(collected === HEART_TOTAL ? 'surpresa' : `${collected}/${HEART_TOTAL} corações`, s.x+portal.w*scale/2, s.y-8*scale);

  if(portalMessageTimer > 0){
    ctx.save();
    ctx.font=`${15*scale}px Arial`;
    ctx.textAlign='center';
    ctx.lineWidth=4*scale;
    ctx.strokeStyle='rgba(255,255,255,.9)';
    ctx.fillStyle='#8c1d62';
    const msg = 'pegue os 7 corações primeiro ❤️';
    ctx.strokeText(msg, s.x+portal.w*scale/2, s.y-34*scale);
    ctx.fillText(msg, s.x+portal.w*scale/2, s.y-34*scale);
    ctx.restore();
  }
}

function wrapText(ctx, text, maxWidth){
  const words = text.split(' ');
  const lines = [];
  let line = '';

  for(const word of words){
    const test = line ? line + ' ' + word : word;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }

  if(line) lines.push(line);
  return lines;
}

function drawSpeechBubble(){
  if(speechBubbleTimer <= 0 || !speechBubbleText) return;

  const s = worldToScreen(player.x, player.y);
  const bubbleW = Math.min(285*scale, W*0.72);
  const padding = 12*scale;
  const fontSize = 13*scale;

  ctx.save();
  ctx.font = `bold ${fontSize}px Arial`;
  ctx.textAlign = 'left';

  const lines = wrapText(ctx, speechBubbleText, bubbleW - padding*2);
  const lineH = 18*scale;
  const bubbleH = padding*2 + lines.length * lineH;

  let x = s.x + player.w*scale/2 - bubbleW/2;
  let y = s.y - bubbleH - 42*scale;

  x = Math.max(12*scale, Math.min(W - bubbleW - 12*scale, x));
  y = Math.max(72*scale, y);

  ctx.fillStyle = 'rgba(255,255,255,0.94)';
  ctx.strokeStyle = 'rgba(255,95,162,0.85)';
  ctx.lineWidth = 2.4*scale;

  ctx.beginPath();
  ctx.roundRect(x, y, bubbleW, bubbleH, 16*scale);
  ctx.fill();
  ctx.stroke();

  // pontinha do balão
  const tipX = s.x + player.w*scale/2;
  const tipY = y + bubbleH;
  ctx.beginPath();
  ctx.moveTo(Math.max(x+20*scale, Math.min(x+bubbleW-20*scale, tipX - 8*scale)), tipY - 1*scale);
  ctx.lineTo(tipX, tipY + 14*scale);
  ctx.lineTo(Math.max(x+20*scale, Math.min(x+bubbleW-20*scale, tipX + 8*scale)), tipY - 1*scale);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#7a1d55';
  for(let i=0;i<lines.length;i++){
    ctx.fillText(lines[i], x + padding, y + padding + (i+0.8)*lineH);
  }

  ctx.restore();
}

function drawPlayer(){
  const s=worldToScreen(player.x, player.y);
  let frame=0;
  const walking=Math.abs(player.vx)>0.35 && player.ground;

  if(!player.ground) frame=9;
  else if(walking) frame=1 + Math.floor(frameTick/6)%8;
  else frame=0;

  const sw=96, sh=128, dw=84*scale, dh=112*scale;
  const dx=s.x + player.w*scale/2 - dw/2;
  const dy=s.y + player.h*scale - dh + 8*scale;

  ctx.fillStyle='rgba(0,0,0,.22)';
  ctx.beginPath();
  ctx.ellipse(s.x+player.w*scale/2, s.y+player.h*scale+8*scale, 20*scale, 6*scale, 0,0,Math.PI*2);
  ctx.fill();

  if(player.face===-1){
    ctx.save();
    ctx.translate(dx+dw/2, dy+dh/2);
    ctx.scale(-1,1);
    ctx.drawImage(imgs.player, frame*sw,0,sw,sh,-dw/2,-dh/2,dw,dh);
    ctx.restore();
  } else {
    ctx.drawImage(imgs.player, frame*sw,0,sw,sh,dx,dy,dw,dh);
  }
}

function draw(){
  drawSky();
  drawDeco();
  drawPhotoSpots();
  drawGroundSegments();
  drawRopes();
  drawLadders();
  drawIslands();
  drawPlatformDecorations();
  drawInvisibleHeartBlocks();
  drawCrates();
  drawSpikes();
  drawHearts();
  drawPortal();
  drawPlayer();
  drawSpeechBubble();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

document.getElementById('startBtn').addEventListener('click', ()=>{
  speechBubbleTimer = 0;
  speechBubbleText = '';
  resetHearts();
  startMusic();
  started=true;
  startScreen.classList.add('hide');
});

document.getElementById('openBtn').addEventListener('click', ()=>{
  window.location.href = ARQUIVO_DA_SURPRESA;
});

musicBtn.addEventListener('click', ()=>{
  toggleMusic();
});

nextMusicBtn.addEventListener('click', ()=>{
  nextMusic();
});

document.addEventListener('touchmove', e=>{
  if(e.target.closest('.controls') || e.target.closest('canvas')) e.preventDefault();
}, {passive:false});

window.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  if(k==='arrowleft'||k==='a') keys.left=true;
  if(k==='arrowright'||k==='d') keys.right=true;
  if(k===' '||k==='arrowup'||k==='w') keys.jump=true;
});

window.addEventListener('keyup', e=>{
  const k=e.key.toLowerCase();
  if(k==='arrowleft'||k==='a') keys.left=false;
  if(k==='arrowright'||k==='d') keys.right=false;
  if(k===' '||k==='arrowup'||k==='w') keys.jump=false;
});

function hold(id,key){
  const b=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[key]=true;};
  const off=e=>{e.preventDefault();keys[key]=false;};
  b.addEventListener('touchstart',on,{passive:false});
  b.addEventListener('touchend',off,{passive:false});
  b.addEventListener('touchcancel',off,{passive:false});
  b.addEventListener('mousedown',on);
  b.addEventListener('mouseup',off);
  b.addEventListener('mouseleave',off);
}
hold('left','left');
hold('right','right');
hold('jump','jump');
</script>
